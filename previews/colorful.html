<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do — Colorful</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fbf6ef;
    --ink: #2b2440;
    --ink-soft: #8a82a0;
    --card-radius: 26px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Figtree", sans-serif; color: var(--ink); min-height: 100vh;
    background:
      radial-gradient(1100px 500px at 90% -10%, #ffe6c9 0%, transparent 55%),
      radial-gradient(900px 500px at -10% 10%, #d9ecff 0%, transparent 50%),
      var(--bg);
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 48px 22px 110px; }

  header { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 30px; }
  h1 {
    font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: clamp(40px, 7vw, 68px);
    line-height: 0.95; letter-spacing: -0.02em;
  }
  h1 .wave { display: inline-block; background: linear-gradient(90deg,#ff7a4d,#ff4d8d,#8a5cff); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .tag { font-size: 15px; color: var(--ink-soft); margin-top: 8px; }
  .date-pill { background: #fff; border: 2px solid var(--ink); border-radius: 999px; padding: 9px 16px; font-weight: 600; font-size: 13px; box-shadow: 4px 4px 0 var(--ink); }

  .bento { display: grid; grid-template-columns: repeat(6, 1fr); gap: 18px; }
  .card {
    --c: #ff7a4d; --c-soft: #fff1ea;
    background: #fff; border: 2.5px solid var(--ink); border-radius: var(--card-radius);
    padding: 22px 22px 24px; box-shadow: 7px 7px 0 var(--ink); position: relative; overflow: hidden;
  }
  .card.todo { grid-column: span 6; }
  .card.shopping { grid-column: span 3; --c: #14b88a; --c-soft: #e6f8f1; }
  .card.bucket { grid-column: span 3; --c: #8a5cff; --c-soft: #efe9ff; }
  @media (max-width: 720px) { .card { grid-column: span 6 !important; box-shadow: 5px 5px 0 var(--ink); } }

  .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .dot { width: 30px; height: 30px; border-radius: 9px; background: var(--c); border: 2.5px solid var(--ink); display: grid; place-items: center; font-size: 16px; flex: none; }
  .card h2 { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.01em; }
  .count { margin-left: auto; background: var(--c-soft); color: var(--ink); border: 2px solid var(--ink); border-radius: 999px; font-size: 12px; font-weight: 700; padding: 3px 11px; }

  form.add { display: flex; gap: 8px; margin: 14px 0 6px; flex-wrap: wrap; }
  form.add input[type=text] {
    flex: 1 1 180px; font: inherit; font-size: 15px; padding: 11px 14px; border-radius: 13px;
    border: 2px solid var(--ink); background: var(--c-soft); color: var(--ink); outline: none;
  }
  form.add input[type=text]:focus { box-shadow: 3px 3px 0 var(--c); }
  form.add input::placeholder { color: var(--ink-soft); }
  .term-toggle { display: inline-flex; background: var(--c-soft); border: 2px solid var(--ink); border-radius: 13px; padding: 2px; }
  .term-toggle button { font: inherit; font-weight: 600; font-size: 13px; padding: 7px 12px; border: none; background: transparent; border-radius: 10px; cursor: pointer; color: var(--ink-soft); }
  .term-toggle button.on { background: var(--c); color: #fff; }
  .add-btn { font: inherit; font-weight: 700; font-size: 15px; padding: 11px 18px; border-radius: 13px; border: 2.5px solid var(--ink); background: var(--c); color: #fff; cursor: pointer; box-shadow: 3px 3px 0 var(--ink); transition: transform .08s; }
  .add-btn:active { transform: translate(3px,3px); box-shadow: none; }

  .subhead { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin: 16px 0 4px; }
  .todo .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 28px; }
  @media (max-width: 560px) { .todo .cols { grid-template-columns: 1fr; } }

  ul.list { list-style: none; }
  li.item { display: flex; align-items: center; gap: 11px; padding: 9px 6px; border-radius: 12px; animation: pop .3s cubic-bezier(.2,1.4,.4,1) both; }
  li.item:hover { background: var(--c-soft); }
  @keyframes pop { from { opacity: 0; transform: scale(.94) translateY(4px); } to { opacity: 1; transform: none; } }
  .check {
    appearance: none; -webkit-appearance: none; width: 23px; height: 23px; border-radius: 8px;
    border: 2.5px solid var(--ink); cursor: pointer; flex: none; position: relative; background: #fff;
    transition: transform .12s;
  }
  .check:hover { transform: scale(1.08); }
  .check:checked { background: var(--c); }
  .check:checked::after { content: ""; position: absolute; left: 6px; top: 2px; width: 6px; height: 11px; border: solid #fff; border-width: 0 3px 3px 0; transform: rotate(42deg); animation: tick .25s cubic-bezier(.2,1.6,.4,1) both; }
  @keyframes tick { from { transform: rotate(42deg) scale(0); } to { transform: rotate(42deg) scale(1); } }
  .txt { flex: 1; font-size: 15.5px; font-weight: 500; word-break: break-word; cursor: text; }
  li.done .txt { color: var(--ink-soft); text-decoration: line-through; }
  .del { background: none; border: none; color: var(--ink-soft); cursor: pointer; opacity: 0; font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 8px; }
  li.item:hover .del { opacity: 1; }
  .del:hover { background: #ffe1e1; color: #e2453f; }
  .empty { color: var(--ink-soft); padding: 10px 6px; font-size: 14px; }

  footer { margin-top: 34px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--ink-soft); }
  .clear { font: inherit; font-weight: 600; background: #fff; border: 2px solid var(--ink); border-radius: 999px; padding: 7px 14px; cursor: pointer; box-shadow: 3px 3px 0 var(--ink); color: var(--ink); }
  .clear:active { transform: translate(3px,3px); box-shadow: none; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Hey — let's <span class="wave">do stuff</span></h1>
        <p class="tag">Your tasks, shopping and big dreams, all in one happy place.</p>
      </div>
      <span class="date-pill" id="today"></span>
    </header>

    <div class="bento">
      <section class="card todo" data-list="todo">
        <div class="card-top"><span class="dot">✓</span><h2>To-Do</h2><span class="count" data-count></span></div>
        <form class="add" autocomplete="off">
          <input type="text" placeholder="What needs doing?" aria-label="New task" />
          <span class="term-toggle" role="group" aria-label="When">
            <button type="button" data-term="now" class="on">This week</button>
            <button type="button" data-term="later">Someday</button>
          </span>
          <button class="add-btn" type="submit">Add</button>
        </form>
        <div class="cols">
          <div>
            <div class="subhead">Today &amp; this week</div>
            <ul class="list" data-group="now"></ul>
          </div>
          <div>
            <div class="subhead">To handle / someday</div>
            <ul class="list" data-group="later"></ul>
          </div>
        </div>
      </section>

      <section class="card shopping" data-list="shopping">
        <div class="card-top"><span class="dot">🛒</span><h2>Shopping</h2><span class="count" data-count></span></div>
        <form class="add" autocomplete="off">
          <input type="text" placeholder="Add an item…" aria-label="New item" />
          <button class="add-btn" type="submit">Add</button>
        </form>
        <ul class="list" data-group="all"></ul>
      </section>

      <section class="card bucket" data-list="bucket">
        <div class="card-top"><span class="dot">⭐</span><h2>Bucket list</h2><span class="count" data-count></span></div>
        <form class="add" autocomplete="off">
          <input type="text" placeholder="Add a dream…" aria-label="New goal" />
          <button class="add-btn" type="submit">Add</button>
        </form>
        <ul class="list" data-group="all"></ul>
      </section>
    </div>

    <footer>
      <span>Saved in this browser · preview</span>
      <button class="clear" id="clearDone">Clear completed</button>
    </footer>
  </div>

  <script src="../assets/storage.js"></script>
  <script src="../assets/preview-app.js"></script>
  <script>
    (function () {
      var d = new Date();
      document.getElementById('today').textContent =
        d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      PreviewApp.start();
    })();
  </script>
</body>
</html>
