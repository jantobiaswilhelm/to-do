<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do — Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0d14;
    --glass: rgba(255,255,255,0.045);
    --glass-2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.10);
    --text: #e8ecf4;
    --muted: #7f8aa6;
    --accent: #5df2c9;
    --accent-2: #6ea8ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Sora", sans-serif; color: var(--text); min-height: 100vh; background: var(--bg);
    background-image:
      radial-gradient(800px 460px at 12% -8%, rgba(93,242,201,0.16), transparent 60%),
      radial-gradient(760px 420px at 92% 4%, rgba(110,168,255,0.16), transparent 58%);
    background-attachment: fixed;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 60px 22px 120px; }

  header { margin-bottom: 34px; }
  .eyebrow { font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); display: flex; justify-content: space-between; }
  .eyebrow .clock { color: var(--muted); }
  h1 {
    font-weight: 700; font-size: clamp(40px, 7vw, 66px); line-height: 1.02; letter-spacing: -0.02em; margin-top: 14px;
  }
  h1 .glow { color: var(--accent); text-shadow: 0 0 28px rgba(93,242,201,0.55); }
  .sub { color: var(--muted); margin-top: 12px; font-size: 15px; max-width: 48ch; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card {
    --c: var(--accent);
    grid-column: span 2;
    background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 22px 22px 24px;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 18px 50px -28px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative; overflow: hidden;
  }
  .card.shopping, .card.bucket { grid-column: span 1; }
  .card.bucket { --c: var(--accent-2); }
  @media (max-width: 680px) { .card.shopping, .card.bucket { grid-column: span 2; } }
  .card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 1px; background: linear-gradient(90deg, transparent, var(--c), transparent); opacity: 0.6; }

  .card-top { display: flex; align-items: center; gap: 11px; margin-bottom: 8px; }
  .card h2 { font-weight: 600; font-size: 20px; letter-spacing: -0.01em; }
  .glyph { width: 9px; height: 9px; border-radius: 50%; background: var(--c); box-shadow: 0 0 14px var(--c); flex: none; }
  .count { margin-left: auto; font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--muted); border: 1px solid var(--border); border-radius: 999px; padding: 3px 9px; }

  form.add { display: flex; gap: 8px; margin: 14px 0 8px; flex-wrap: wrap; }
  form.add input[type=text] {
    flex: 1 1 160px; font: inherit; font-size: 15px; padding: 11px 14px; border-radius: 12px;
    border: 1px solid var(--border); background: rgba(0,0,0,0.25); color: var(--text); outline: none;
  }
  form.add input[type=text]:focus { border-color: var(--c); box-shadow: 0 0 0 3px rgba(93,242,201,0.12); }
  form.add input::placeholder { color: var(--muted); }
  .term-toggle { display: inline-flex; background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 12px; padding: 2px; }
  .term-toggle button { font: inherit; font-size: 13px; padding: 7px 12px; border: none; background: transparent; border-radius: 10px; cursor: pointer; color: var(--muted); }
  .term-toggle button.on { background: var(--glass-2); color: var(--accent); }
  .add-btn {
    font: inherit; font-weight: 600; font-size: 15px; padding: 11px 18px; border-radius: 12px; cursor: pointer;
    border: 1px solid var(--c); background: rgba(93,242,201,0.10); color: var(--accent);
    transition: background .15s, box-shadow .15s;
  }
  .add-btn:hover { background: rgba(93,242,201,0.18); box-shadow: 0 0 22px -4px var(--c); }

  .subhead { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin: 16px 0 4px; }
  .todo .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 26px; }
  @media (max-width: 560px) { .todo .cols { grid-template-columns: 1fr; } }

  ul.list { list-style: none; }
  li.item { display: flex; align-items: center; gap: 12px; padding: 9px 6px; border-radius: 11px; animation: fade .35s ease both; }
  li.item:hover { background: var(--glass); }
  @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .check {
    appearance: none; -webkit-appearance: none; width: 21px; height: 21px; border-radius: 50%;
    border: 1.5px solid var(--muted); cursor: pointer; flex: none; position: relative; transition: all .18s;
  }
  .check:hover { border-color: var(--c); }
  .check:checked { background: var(--c); border-color: var(--c); box-shadow: 0 0 16px -2px var(--c); }
  .check:checked::after { content: ""; position: absolute; left: 6.5px; top: 3px; width: 5px; height: 9px; border: solid #07120e; border-width: 0 2px 2px 0; transform: rotate(42deg); }
  .txt { flex: 1; font-size: 15.5px; word-break: break-word; cursor: text; }
  li.done .txt { color: var(--muted); text-decoration: line-through; }
  .del { background: none; border: none; color: var(--muted); cursor: pointer; opacity: 0; font-size: 19px; line-height: 1; padding: 2px 6px; border-radius: 8px; }
  li.item:hover .del { opacity: 1; }
  .del:hover { color: #ff7a7a; }
  .empty { color: var(--muted); padding: 10px 6px; font-size: 14px; font-style: italic; }

  footer { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--muted); }
  .clear { font: inherit; font-size: 12px; background: transparent; border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px; cursor: pointer; color: var(--muted); }
  .clear:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow"><span>// personal os</span><span class="clock" id="today"></span></div>
      <h1>Stay on <span class="glow">track</span>.</h1>
      <p class="sub">Tasks, shopping and the bucket list — one calm, dark dashboard that syncs with you.</p>
    </header>

    <div class="grid">
      <section class="card todo" data-list="todo">
        <div class="card-top"><span class="glyph"></span><h2>To-Do</h2><span class="count" data-count></span></div>
        <form class="add" autocomplete="off">
          <input type="text" placeholder="Add a task…" aria-label="New task" />
          <span class="term-toggle" role="group" aria-label="When">
            <button type="button" data-term="now" class="on">This week</button>
            <button type="button" data-term="later">Someday</button>
          </span>
          <button class="add-btn" type="submit">Add</button>
        </form>
        <div class="cols">
          <div>
            <div class="subhead">Today &amp; this week</div>
            <ul class="list" data-group="now"></ul>
          </div>
          <div>
            <div class="subhead">To handle / someday</div>
            <ul class="list" data-group="later"></ul>
          </div>
        </div>
      </section>

      <section class="card shopping" data-list="shopping">
        <div class="card-top"><span class="glyph"></span><h2>Shopping</h2><span class="count" data-count></span></div>
        <form class="add" autocomplete="off">
          <input type="text" placeholder="Add an item…" aria-label="New item" />
          <button class="add-btn" type="submit">Add</button>
        </form>
        <ul class="list" data-group="all"></ul>
      </section>

      <section class="card bucket" data-list="bucket">
        <div class="card-top"><span class="glyph"></span><h2>Bucket list</h2><span class="count" data-count></span></div>
        <form class="add" autocomplete="off">
          <input type="text" placeholder="Add a goal…" aria-label="New goal" />
          <button class="add-btn" type="submit">Add</button>
        </form>
        <ul class="list" data-group="all"></ul>
      </section>
    </div>

    <footer>
      <span>saved in this browser · preview</span>
      <button class="clear" id="clearDone">clear completed</button>
    </footer>
  </div>

  <script src="../assets/storage.js"></script>
  <script src="../assets/preview-app.js"></script>
  <script>
    (function () {
      var d = new Date();
      document.getElementById('today').textContent =
        d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }).toUpperCase();
      PreviewApp.start();
    })();
  </script>
</body>
</html>
